<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Support Portal</title>
  <link rel="stylesheet" href="/portal/portal.css" />
  <!-- Netlify Identity Widget -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>

<!-- ── Login view ──────────────────────────────────────────────────────────── -->
<div id="login-view">
  <div class="login-card">
    <div class="login-logo">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
        <rect width="36" height="36" rx="8" fill="#1d4ed8"/>
        <path d="M10 26 L18 10 L26 26" stroke="#fff" stroke-width="2.5" stroke-linejoin="round" fill="none"/>
        <path d="M13 21 H23" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
    </div>
    <h1>Support Portal</h1>
    <p>Sign in to view your tickets and service status.</p>
    <button class="btn btn-primary" id="login-btn">Sign in</button>
  </div>
</div>

<!-- ── Dashboard view ─────────────────────────────────────────────────────── -->
<div id="dashboard-view" class="hidden">

  <header>
    <div class="header-brand">
      <svg width="24" height="24" viewBox="0 0 36 36" fill="none">
        <rect width="36" height="36" rx="8" fill="rgba(255,255,255,.2)"/>
        <path d="M10 26 L18 10 L26 26" stroke="#fff" stroke-width="2.5" stroke-linejoin="round" fill="none"/>
        <path d="M13 21 H23" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
      <span>Support Portal</span>
    </div>
    <div class="header-actions">
      <span id="header-email" class="header-email"></span>
      <button class="btn btn-ghost" id="logout-btn">Sign out</button>
    </div>
  </header>

  <main>
    <!-- Executive Summary -->
    <section id="summary-section" class="summary-card">
      <div class="summary-inner">
        <div class="summary-text">
          <div id="summary-headline" class="summary-headline">Loading…</div>
          <div id="summary-trend"    class="summary-trend"></div>
        </div>
        <div id="summary-updated" class="summary-updated"></div>
      </div>
    </section>

    <!-- Stat cards + range filter -->
    <div class="stats-bar">
      <div class="stat-cards" id="stat-cards">
        <div class="stat-card skeleton"></div>
        <div class="stat-card skeleton"></div>
        <div class="stat-card skeleton"></div>
        <div class="stat-card skeleton"></div>
      </div>
      <div class="range-picker">
        <span class="range-label">Closed tickets:</span>
        <button class="range-btn active" data-range="30">30d</button>
        <button class="range-btn" data-range="60">60d</button>
        <button class="range-btn" data-range="90">90d</button>
      </div>
    </div>

    <!-- Charts row -->
    <div class="charts-row">
      <div class="card chart-card">
        <div class="card-header">Monthly Ticket Volume</div>
        <div class="chart-wrap">
          <canvas id="chart-volume"></canvas>
        </div>
      </div>
      <div class="card chart-card">
        <div class="card-header">Open Tickets by Priority</div>
        <div class="chart-wrap">
          <canvas id="chart-priority"></canvas>
        </div>
      </div>
    </div>

    <!-- Tables row -->
    <div class="tables-row">
      <div class="card table-card">
        <div class="card-header">Open Tickets</div>
        <div id="open-table-wrap"><div class="tbl-loading">Loading…</div></div>
      </div>
      <div class="card table-card">
        <div class="card-header" id="closed-header">Recently Closed</div>
        <div id="closed-table-wrap"><div class="tbl-loading">Loading…</div></div>
      </div>
    </div>
  </main>
</div>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script src="/portal/portal.js"></script>
</body>
</html>
