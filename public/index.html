<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Autotask Dashboard</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

<header>
  <h1>Autotask Dashboard</h1>
  <span id="last-updated"></span>
  <button class="btn btn-ghost" id="refresh-btn">Refresh</button>
  <button class="btn btn-white" id="customize-btn">Customize</button>
</header>

<main id="dashboard"></main>

<!-- Dim overlay behind the customize panel -->
<div id="customize-overlay"></div>

<!-- Customize slide-in panel -->
<aside id="customize-panel">
  <div class="customize-header">
    <h2>Customize Dashboard</h2>
    <button id="close-customize" title="Close">✕</button>
  </div>
  <p class="customize-hint">Drag to reorder &nbsp;·&nbsp; Toggle to show/hide</p>
  <ul id="widget-list"></ul>
  <div class="customize-footer">
    <button class="btn btn-soft" id="cancel-customize">Cancel</button>
    <button class="btn btn-solid" id="save-customize">Save</button>
  </div>
</aside>

<!-- Chart.js v4 -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<!-- SortableJS for drag-to-reorder in customize panel -->
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<!-- Dashboard app -->
<script src="/app.js"></script>

</body>
</html>
