[build]
  publish = "public"
  functions = "netlify/functions"

[dev]
  framework = "#static"
  targetPort = 8888

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/admin"
  to   = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/portal"
  to   = "/portal/index.html"
  status = 200
